<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111111"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1200" height="4" fill="#FFC200"/>

  <!-- LCD-style timer display -->
  <rect x="80" y="180" width="440" height="100" rx="8" fill="#1a1a00" stroke="#FFC200" stroke-width="1" opacity="0.6"/>
  <text x="300" y="255" font-family="monospace" font-size="64" font-weight="bold" fill="#FFC200" text-anchor="middle" filter="url(#glow)" opacity="0.9">02:58:42</text>

  <!-- KIZARM logo -->
  <text x="80" y="120" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="#FFFFFF" letter-spacing="8">KIZARM</text>

  <!-- Tagline -->
  <text x="80" y="360" font-family="Arial, sans-serif" font-size="32" fill="#CCCCCC">マラソン・ランニングの記録を、</text>
  <text x="80" y="408" font-family="Arial, sans-serif" font-size="32" fill="#CCCCCC">自分だけのページに。</text>

  <!-- Sub text -->
  <text x="80" y="480" font-family="Arial, sans-serif" font-size="22" fill="#888888">自己ベスト自動追跡 ・ 成長グラフ ・ シェアできるプロフィール</text>

  <!-- URL -->
  <text x="80" y="560" font-family="Arial, sans-serif" font-size="24" fill="#FFC200" opacity="0.8">kizarm.com</text>

  <!-- Decorative dots -->
  <circle cx="1100" cy="315" r="120" fill="#FFC200" opacity="0.04"/>
  <circle cx="1100" cy="315" r="80" fill="#FFC200" opacity="0.04"/>
  <circle cx="1100" cy="315" r="40" fill="#FFC200" opacity="0.06"/>
</svg>
